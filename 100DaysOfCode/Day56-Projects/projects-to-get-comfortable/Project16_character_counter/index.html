<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character counter </title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>
    <div class="container">
        <h1>Character count</h1>
        <textarea id="text-input" class="form-control mb-3" placeholder="Enter Text..." maxlength="50"></textarea>

        <div class="controls">
            <p class="counter text-muted">Character:
                <span id="char-count">0</span> / 50
            </p>
            <button id="clear-btn">Clear Text</button>
        </div>
    </div>
</body>

</html>
