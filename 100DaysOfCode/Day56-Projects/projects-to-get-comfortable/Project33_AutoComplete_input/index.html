<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Autocomplete</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="search-container">
        <h1>Inline Autocomplete</h1>
        <div class="input-wrapper">
            <input type="text" id="ghost-input" readonly tabindex="-1" autocomplete="off">
            <input type="text" id="autocomplete-input" placeholder="Type an English word..." autocomplete="off">
        </div>
        <p class="hint">Press <strong>Tab</strong> to accept suggestion.</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
