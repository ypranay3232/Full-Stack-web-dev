<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Tab Component</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
</head>
<body>

    <div class="wrapper">
        <div class="icon" id="left"><i class="fa-solid fa-angle-left"></i></div>
        <ul class="tabs-box">
            <li class="tab active" tabindex="0">Html</li>
            <li class="tab" tabindex="0">Css</li>
            <li class="tab" tabindex="0">JavaScript</li>
            <li class="tab" tabindex="0">React Js</li>
            <li class="tab" tabindex="0">Node Js</li>
            <li class="tab" tabindex="0">Mongo Db</li>
            <li class="tab" tabindex="0">Next Js</li>
            <li class="tab" tabindex="0">Python</li>
            <li class="tab" tabindex="0">Django</li>
            <li class="tab" tabindex="0">Tailwind</li>
            <li class="tab" tabindex="0">Bootstrap</li>
        </ul>
        <div class="icon" id="right"><i class="fa-solid fa-angle-right"></i></div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
