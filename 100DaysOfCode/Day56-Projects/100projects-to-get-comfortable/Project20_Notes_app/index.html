<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Notes</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 400px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
        }

        header {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            background: #000;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        li button {
            background: #ff4d4d;
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <header>
        <input type="text" id="input" placeholder="New note...">
        <button onclick="addNote()">Add</button>
    </header>

    <ul id="list"></ul>

    <script>
        const input = document.getElementById('input');
        const list = document.getElementById('list');
        // Load notes from storage or default to empty array
        let notes = JSON.parse(localStorage.getItem('notes') || '[]');

        const render = () => {
            localStorage.setItem('notes', JSON.stringify(notes));
            list.innerHTML = notes.map((note, i) => `
                <li>
                    ${note}
                    <button onclick="deleteNote(${i})">Delete</button>
                </li>
            `).join('');
        };

        const addNote = () => {
            if (!input.value.trim()) return;
            notes.push(input.value.trim());
            input.value = '';
            render();
        };

        const deleteNote = (index) => {
            notes.splice(index, 1);
            render();
        };

        // Allow "Enter" key to add notes
        input.addEventListener('keypress', (e) => e.key === 'Enter' && addNote());

        render();
    </script>
</body>

</html>
