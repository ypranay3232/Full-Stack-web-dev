<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and drop</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body>
    <!-- The drag and drop contains a container inside it we have the boxes and that boxes contains items  -->
     <div class="container">
        <div class="left"></div>
        <div class="middle">
            <!-- here we add the items that will be drag and dropable. We use a property called draggable="true"   -->
            <div class="list" draggable="true">List Item 1</div>
            <div class="list" draggable="true">List Item 2</div>
            <div class="list" draggable="true">List Item 3</div>
        </div>
        <div class="right"></div>
     </div>
</body>
</html>
